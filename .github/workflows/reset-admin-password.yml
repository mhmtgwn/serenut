name: Reset Sysadmin Password (One-Time)

on:
  workflow_dispatch:
    inputs:
      new_password:
        description: "New sysadmin password"
        required: true
        type: string
      sysadmin_email:
        description: "Sysadmin email address"
        required: true
        default: "sysadmin@serenut.com"

jobs:
  reset-password:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Reset sysadmin password on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            cd /var/www/serenut/server
            docker compose -f docker-compose.prod.yml --env-file .env.production exec -T backend \
              node -e "
                const bcrypt = require('bcrypt');
                const { Pool } = require('pg');
                require('dotenv').config();
                const pool = new Pool({ connectionString: process.env.DATABASE_URL });
                async function run() {
                  try {
                    const targetEmail = '${{ inputs.sysadmin_email }}'.trim().toLowerCase();
                    const newPassword = '${{ inputs.new_password }}';
                    const hash = await bcrypt.hash(newPassword, 12);
                    
                    console.log('Searching for users...');
                    const allUsers = await pool.query('SELECT u.id, u.email, u.name, u.is_active, ARRAY_AGG(ur.role_id) as roles FROM users u LEFT JOIN user_roles ur ON u.id = ur.user_id GROUP BY u.id');
                    console.log('Existing users:', JSON.stringify(allUsers.rows, null, 2));

                    let res = await pool.query(
                      \`UPDATE users SET password_hash = \$1, failed_login_attempts = 0, locked_until = NULL, is_active = true WHERE LOWER(email) = \$2 OR id = 'user-sysadmin' RETURNING id, name, email\`,
                      [hash, targetEmail]
                    );

                    if (res.rows.length === 0) {
                      console.log('User not found by email or id=user-sysadmin. Creating/ensuring sysadmin user...');
                      // Ensure role exists
                      await pool.query(\`INSERT INTO roles (id, name, description) VALUES ('sysadmin', 'sysadmin', 'System Administrator') ON CONFLICT (id) DO NOTHING\`);
                      await pool.query(\`INSERT INTO companies (id, name, tax_number, email, status) VALUES ('serenut_cloud', 'Serenut Cloud', '0000000000', \$1, 'active') ON CONFLICT (id) DO NOTHING\`, [targetEmail]);
                      const insertRes = await pool.query(\`INSERT INTO users (id, company_id, name, email, password_hash, is_active, email_verified_at) VALUES ('user-sysadmin', 'serenut_cloud', 'System Admin', \$1, \$2, true, NOW()) ON CONFLICT (id) DO UPDATE SET email = EXCLUDED.email, password_hash = EXCLUDED.password_hash, is_active = true RETURNING id, name, email\`, [targetEmail, hash]);
                      await pool.query(\`INSERT INTO user_roles (user_id, role_id) VALUES ('user-sysadmin', 'sysadmin') ON CONFLICT DO NOTHING\`);
                      res = insertRes;
                    }

                    console.log('✅ Password reset / user creation successful:', JSON.stringify(res.rows[0]));
                  } catch (err) {
                    console.error('❌ Error:', err.message);
                    process.exit(1);
                  } finally {
                    await pool.end();
                  }
                }
                run();
              "
