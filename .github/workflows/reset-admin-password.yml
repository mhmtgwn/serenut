name: Reset Sysadmin Password (One-Time)

on:
  workflow_dispatch:
    inputs:
      new_password:
        description: "New sysadmin password"
        required: true
        type: string
      sysadmin_email:
        description: "Sysadmin email address"
        required: true
        default: "sysadmin@serenut.com"

jobs:
  reset-password:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Reset sysadmin password on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            cd /var/www/serenut/server
            docker compose -f docker-compose.prod.yml --env-file .env.production exec -T backend node -e "const bcrypt = require('bcrypt'); const { Pool } = require('pg'); require('dotenv').config(); const pool = new Pool({ connectionString: process.env.DATABASE_URL }); bcrypt.hash('${{ inputs.new_password }}', 12).then(hash => pool.query('UPDATE users SET password_hash = \$1, failed_login_attempts = 0, locked_until = NULL, is_active = true WHERE email = \$2 RETURNING id, name, email', [hash, '${{ inputs.sysadmin_email }}'])).then(res => { if (res.rows.length > 0) { console.log('Password reset successful:', JSON.stringify(res.rows[0])); } else { console.error('User not found:', '${{ inputs.sysadmin_email }}'); process.exit(1); } pool.end(); }).catch(err => { console.error('Error:', err.message); process.exit(1); });"
