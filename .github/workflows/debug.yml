name: Debug CI
on:
  push:
    branches: [ staging ]

jobs:
  debug-ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: |
          cd server
          npm install --legacy-peer-deps
          npm run build
      - env:
          PGPASSWORD: postgrespassword
        run: psql -h localhost -p 5433 -U postgres -d postgres -c "CREATE DATABASE testdb;"
      - env:
          DATABASE_URL: postgres://postgres:postgrespassword@localhost:5433/testdb
        run: |
          cd server
          npm run migrate
      - env:
          NODE_ENV: test
          DATABASE_URL: postgres://postgres:postgrespassword@localhost:5433/postgres
          TEST_DATABASE_URL: postgres://postgres:postgrespassword@localhost:5433/testdb
          JWT_SECRET: testing-jwt-secret-key-that-is-at-least-32-chars-long
          INVOICES_DIR: ./invoices
        run: |
          cd server
          rm -f .env.test
          npm run test > test_output.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: server/test_output.log
