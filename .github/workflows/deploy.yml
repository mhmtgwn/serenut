name: Serenut OS Continuous Integration & Staging Deployment

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  backend-ci:
    name: Backend CI & Database Rollback Validation
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'

      - name: Install Server Dependencies
        run: |
          cd server
          npm install --legacy-peer-deps

      - name: Compile TypeScript Server
        run: |
          cd server
          npm run build

      - name: Validate Database Schema Migrations (Up)
        env:
          DATABASE_URL: postgres://postgres:postgrespassword@localhost:5432/postgres
        run: |
          cd server
          npm run migrate

      - name: Run Sprint 2 Verification Tests (Sync, Idempotency, Triggers)
        env:
          DATABASE_URL: postgres://postgres:postgrespassword@localhost:5432/postgres
          JWT_SECRET: testing-jwt-secret-key-that-is-at-least-32-chars-long
        run: |
          cd server
          npx ts-node src/test/sprint2_verification.ts

      - name: Run Sprint 8 Verification Tests (Billing, Grace Period, Suspension)
        env:
          DATABASE_URL: postgres://postgres:postgrespassword@localhost:5432/postgres
          JWT_SECRET: testing-jwt-secret-key-that-is-at-least-32-chars-long
          INVOICES_DIR: ./invoices
        run: |
          cd server
          npx ts-node src/test/sprint8_verification.ts

      - name: Run Sprint 9 Verification Tests (Notification Gateways, Caching)
        env:
          DATABASE_URL: postgres://postgres:postgrespassword@localhost:5432/postgres
          JWT_SECRET: testing-jwt-secret-key-that-is-at-least-32-chars-long
        run: |
          cd server
          npx ts-node src/test/sprint9_verification.ts

  frontend-ci:
    name: Frontend CI & Build Compilation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java SDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Run Static Code Analysis (Strict warnings as failure)
        run: flutter analyze --fatal-warnings

      - name: Run Widget & Logic Tests
        run: flutter test --fail-fast

      - name: Create keystore properties
        run: |
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=serenut" >> android/key.properties
          echo "storeFile=serenut-release.jks" >> android/key.properties

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: serenut-pos-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  windows-ci:
    name: Windows Installer Build
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Build Windows Executable
        run: flutter build windows --release

      - name: Compile Inno Setup Installer
        run: iscc windows\installer\serenut_installer.iss
        continue-on-error: true

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: serenut-pos-windows-build
          path: build/windows/x64/runner/Release/

  deploy-staging:
    name: Continuous Staging Deployment (VPS)
    needs: [backend-ci]
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'

    steps:
      - name: Deploy to Staging VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_VPS_HOST }}
          username: ${{ secrets.STAGING_VPS_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          port: ${{ secrets.STAGING_VPS_PORT || 22 }}
          script: |
            cd /var/www/serenut/server
            git fetch --all
            git reset --hard origin/main
            sed -i '/^GIT_COMMIT=/d' .env.production || true
            echo "GIT_COMMIT=${{ github.sha }}" >> .env.production
            npm ci --only=production
            set -a
            [ -f .env.production ] && . .env.production
            set +a
            # Execute Rollback & Schema integrity validation
            bash devops/migrate-with-rollback.sh || exit 1
            docker compose -f docker-compose.prod.yml build
            # Restart Services with resource limits
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d
            sleep 25
            docker compose -f docker-compose.prod.yml exec -T backend node public/website/downloads/seed_production.js
            logger info "Staging deployment and database release seeding completed successfully."
