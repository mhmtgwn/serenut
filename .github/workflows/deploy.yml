name: Serenut OS Continuous Integration & Staging Deployment

on:
  push:
    branches: [ main, master, develop, staging ]
  pull_request:
    branches: [ main, master, develop, staging ]

jobs:
  backend-ci:
    name: Backend CI & Database Rollback Validation
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'

      - name: Install Server Dependencies
        run: |
          cd server
          npm install --legacy-peer-deps

      - name: Compile TypeScript Server
        run: |
          cd server
          npm run build

      - name: Create Test Database
        env:
          PGPASSWORD: postgrespassword
        run: psql -h localhost -U postgres -d postgres -c "CREATE DATABASE testdb;"

      - name: Validate Database Schema Migrations (Up)
        env:
          DATABASE_URL: postgres://postgres:postgrespassword@localhost:5432/testdb
        run: |
          cd server
          npm run migrate

      - name: Run All Verification Tests
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://postgres:postgrespassword@localhost:5432/postgres
          TEST_DATABASE_URL: postgres://postgres:postgrespassword@localhost:5432/testdb
          JWT_SECRET: testing-jwt-secret-key-that-is-at-least-32-chars-long
          INVOICES_DIR: ./invoices
        run: |
          cd server
          npm run test

  frontend-ci:
    name: Frontend CI & Build Compilation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java SDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Run Static Code Analysis (Errors only)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run Widget & Logic Tests
        run: flutter test --fail-fast

      - name: Create keystore properties
        run: |
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=serenut" >> android/key.properties
          echo "storeFile=serenut-release.jks" >> android/key.properties

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: serenut-pos-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  windows-ci:
    name: Windows Installer Build
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Build Windows Executable
        run: flutter build windows --release

      - name: Compile Inno Setup Installer
        run: iscc windows\installer\serenut_installer.iss

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: serenut-pos-windows-build
          path: build/windows/x64/runner/Release/

  deploy-production:
    name: Continuous Production Deployment (VPS)
    needs: [backend-ci]
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'

    steps:
      - name: Deploy to Production VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: "185.255.93.94"
          username: "root"
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.STAGING_VPS_PORT || 22 }}
          script: |
            mkdir -p /var/www/serenut
            cd /var/www/serenut
            if [ ! -d .git ]; then
              git init
              git remote add origin https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/mhmtgwn/serenut.git
            else
              git remote set-url origin https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/mhmtgwn/serenut.git
            fi
            git fetch --all
            git reset --hard origin/main
            cd server
            sed -i '/^GIT_COMMIT=/d' .env.production || true
            echo "GIT_COMMIT=${{ github.sha }}" >> .env.production
            npm ci --only=production --legacy-peer-deps
            set -a
            [ -f .env.production ] && . .env.production
            set +a
            # Execute Rollback & Schema integrity validation
            bash devops/migrate-with-rollback.sh || echo "⚠️ Migration script returned non-zero, continuing..."
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d
            sleep 25
            docker compose -f docker-compose.prod.yml exec -T backend node public/website/downloads/seed_production.js
            logger info "Production deployment and database release seeding completed successfully."

  deploy-staging:
    name: Continuous Staging Deployment (VPS)
    needs: [backend-ci]
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/develop') && github.event_name == 'push'

    steps:
      - name: Deploy to Staging VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: "185.255.93.94"
          username: "root"
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.STAGING_VPS_PORT || 22 }}
          script: |
            mkdir -p /var/www/serenut-staging
            cd /var/www/serenut-staging
            if [ ! -d .git ]; then
              git init
              git remote add origin https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/mhmtgwn/serenut.git
            else
              git remote set-url origin https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/mhmtgwn/serenut.git
            fi
            git fetch --all
            git reset --hard origin/staging
            sudo bash server/scripts/deploy_staging.sh
