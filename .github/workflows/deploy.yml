name: Serenut CI and Deployment

on:
  workflow_dispatch:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: serenut-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: postgres
        ports: ["5433:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci --legacy-peer-deps
        working-directory: server
      - run: npm run build
        working-directory: server
      - name: Create isolated acceptance database
        env:
          PGPASSWORD: postgrespassword
        run: psql -h localhost -p 5433 -U postgres -d postgres -c "CREATE DATABASE serenut_test;"
      - name: Run migrations and tests
        working-directory: server
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://postgres:postgrespassword@localhost:5433/postgres
          TEST_DATABASE_URL: postgres://postgres:postgrespassword@localhost:5433/serenut_test
          JWT_SECRET: testing-jwt-secret-key-that-is-at-least-32-chars-long
          APP_SECRET: testing-app-secret-key-that-is-at-least-32-bytes-long
          INVOICES_DIR: ./invoices
        run: |
          rm -f .env.test
          DATABASE_URL="$TEST_DATABASE_URL" npm run migrate
          npm run test

  flutter-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - run: flutter test --fail-fast
      - name: Configure Android signing
        id: android-signing
        if: github.event_name != 'pull_request'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Android signing secrets are not configured; release artifact build is skipped."
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/serenut-release.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=serenut-release.jks\n' \
            "$ANDROID_KEYSTORE_PASSWORD" "$ANDROID_KEYSTORE_PASSWORD" "$ANDROID_KEY_ALIAS" > android/key.properties
      - run: flutter build apk --release
        if: github.event_name != 'pull_request' && steps.android-signing.outputs.configured == 'true'
      - uses: actions/upload-artifact@v4
        if: github.event_name != 'pull_request' && steps.android-signing.outputs.configured == 'true'
        with:
          name: serenut-os-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  windows-ci:
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - run: iscc windows\installer\serenut_installer.iss
      - uses: actions/upload-artifact@v4
        with:
          name: serenut-os-windows-installer
          path: build/windows/installer/SerenutOSSetup.exe

  deploy-production:
    needs: [backend-ci, flutter-ci, windows-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: serenut-os-android-apk
          path: release-artifacts/android
      - uses: actions/download-artifact@v4
        with:
          name: serenut-os-windows-installer
          path: release-artifacts/windows
      - name: Upload release files to production
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: release-artifacts/*
          target: /var/www/serenut/server/releases/_incoming
          strip_components: 1
      - name: Deploy production
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            cd /var/www/serenut
            if [ ! -d .git ]; then
              git init
              git remote add origin https://github.com/mhmtgwn/serenut.git
            fi
            git fetch origin main
            git reset --hard origin/main
            cd server
            docker compose -f docker-compose.prod.yml --env-file .env.production build
            docker compose -f docker-compose.prod.yml --env-file .env.production run --rm backend node dist/scripts/run-migrations.js
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --remove-orphans
            docker compose -f docker-compose.prod.yml --env-file .env.production ps
            curl --fail --retry 10 --retry-delay 3 --retry-all-errors http://127.0.0.1:3000/health
            docker compose -f docker-compose.prod.yml --env-file .env.production exec -T backend node dist/scripts/publish-release.js android 1.1.0 /var/www/serenut-api/releases/_incoming/android/app-release.apk false
            docker compose -f docker-compose.prod.yml --env-file .env.production exec -T backend node dist/scripts/publish-release.js windows 1.1.0 /var/www/serenut-api/releases/_incoming/windows/SerenutOSSetup.exe false
            curl --fail https://api.serenut.com/api/v1/updates/latest-metadata

  deploy-staging:
    needs: [backend-ci, flutter-ci, windows-ci]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy staging
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: sudo bash /var/www/serenut-staging/server/scripts/deploy_staging.sh
