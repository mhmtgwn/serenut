server {
    server_name serenut.com www.serenut.com api.serenut.com;

    root /var/www/serenut/server/public;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # API/WebSocket traffic still goes to the Node backend.
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
    }

    location /health {
        proxy_pass http://127.0.0.1:3000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Customer/admin SPAs and shared assets are static and must stay online even if Node is restarting.
    location /portal/ {
        try_files $uri $uri/ /portal/index.html;
    }

    location = /portal {
        return 301 /portal/;
    }

    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    location = /admin {
        return 301 /admin/;
    }

    location /shared/ {
        try_files $uri =404;
    }

    # Public website clean URLs. These should not depend on the backend process.
    location = / {
        try_files /website/index.html =404;
    }

    location ~ ^/(platform|plans|downloads|contact|privacy|kvkk|terms|404)$ {
        try_files /website/$1.html =404;
    }

    location = /login {
        return 301 /portal/;
    }

    location = /login.html {
        return 301 /portal/;
    }

    location = /signup {
        return 301 /portal/#register;
    }

    location = /signup.html {
        return 301 /portal/#register;
    }

    location = /robots.txt {
        try_files /website/robots.txt =404;
    }

    location = /sitemap.xml {
        try_files /website/sitemap.xml =404;
    }

    # Website relative assets when pages are served as clean URLs (/plans -> /css/... /js/...).
    location /css/ {
        try_files /website$uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /js/ {
        try_files /website$uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /website/ {
        try_files $uri $uri/ /website/index.html;
    }

    # Fallback to static public files first; only API paths are proxied.
    location / {
        try_files $uri $uri/ /website/index.html;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/serenut.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/serenut.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = api.serenut.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = www.serenut.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = serenut.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name serenut.com www.serenut.com api.serenut.com;
    return 404; # managed by Certbot
}
