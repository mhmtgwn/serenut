server {
    listen 80;
    server_name _;

    # Website static files
    location /website {
        alias /var/www/serenut/server/public/website;
        index index.html;
        try_files $uri $uri/ /website/index.html;
    }

    # Admin panel
    location /admin {
        alias /var/www/serenut/server/public/admin;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # Customer portal
    location /portal {
        alias /var/www/serenut/server/public/portal;
        index index.html;
        try_files $uri $uri/ /portal/index.html;
    }

    # Shared static assets (CSS, etc.)
    location /shared {
        alias /var/www/serenut/server/public/shared;
    }

    # API proxy to backend
    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # WebSocket support
    location /socket.io {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:3000/health;
    }

    # Root redirect to website
    location / {
        return 301 /website;
    }
}
