server {
    listen 80;
    listen [::]:80;
    server_name serenut.com www.serenut.com api.serenut.com _;

    root /var/www/serenut/server/public;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Only API and health traffic depends on the Node backend.
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    location /health {
        proxy_pass http://127.0.0.1:3000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # Customer portal/admin panels are static SPAs and should stay online during backend restarts.
    location /portal/ {
        try_files $uri $uri/ /portal/index.html;
    }

    location = /portal {
        return 301 /portal/;
    }

    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    location = /admin {
        return 301 /admin/;
    }

    location /shared/ {
        try_files $uri =404;
    }

    # Public website clean URLs served directly by Nginx.
    location = / {
        try_files /website/index.html =404;
    }

    location ~ ^/(platform|plans|downloads|contact|privacy|kvkk|terms|404)$ {
        try_files /website/$1.html =404;
    }

    location = /login {
        return 301 /portal/;
    }

    location = /login.html {
        return 301 /portal/;
    }

    location = /signup {
        return 301 /portal/#register;
    }

    location = /signup.html {
        return 301 /portal/#register;
    }

    location = /robots.txt {
        try_files /website/robots.txt =404;
    }

    location = /sitemap.xml {
        try_files /website/sitemap.xml =404;
    }

    # Website pages use relative /css and /js paths when served as clean URLs.
    location /css/ {
        try_files /website$uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /js/ {
        try_files /website$uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /website/ {
        try_files $uri $uri/ /website/index.html;
    }

    # Static fallback. API paths are handled above; public pages do not proxy to Node.
    location / {
        try_files $uri $uri/ /website/index.html;
    }
}
