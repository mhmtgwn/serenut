# server/nginx.conf
# Nginx Configuration for Serenut OS SaaS Orchestrator (Production)
# Blueprint: Production Deployment Sprint (Reverse Proxy, SSL, WebSocket Routing)

# Rate Limiting Definition
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=15r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

server {
    listen 80;
    server_name serenut.com www.serenut.com api.serenut.com;

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name serenut.com www.serenut.com;

    # SSL Certificates (Let's Encrypt / Certbot paths)
    ssl_certificate /etc/letsencrypt/live/serenut.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/serenut.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA256';
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval'; frame-ancestors 'none';" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Static Website
    location / {
        root /var/www/serenut-api/public/website;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Static Customer Portal
    location /portal {
        alias /var/www/serenut-api/public/portal;
        index index.html;
        try_files $uri $uri/ /portal/index.html;
    }

    # Static Sysadmin Panel (Restricted access can be configured here via IP limits)
    location /admin {
        alias /var/www/serenut-api/public/admin;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }
}

server {
    listen 443 ssl http2;
    server_name api.serenut.com;

    ssl_certificate /etc/letsencrypt/live/serenut.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/serenut.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    # Express JSON API Router Reverse Proxy
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth specific rate limit proxy
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Live Real-time WebSocket Upgrades
    location /api/v1/realtime/live {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 300s; # 5 minutes keepalive timeout
        proxy_send_timeout 300s;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Secure Uploaded Releases
    location /releases/ {
        alias /var/www/serenut-api/releases/;
        internal; # Allow only internal X-Accel-Redirect downloads from Express
    }
}
