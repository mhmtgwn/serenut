# ── Nginx Production Configuration — Serenut OS ───────────────────────────────
# Dosya: server/nginx/nginx.conf
#
# Kurulum:
#   1. Bu dosyayı /etc/nginx/sites-available/serenut.conf konumuna kopyalayın.
#   2. sudo ln -s /etc/nginx/sites-available/serenut.conf /etc/nginx/sites-enabled/
#   3. sudo certbot --nginx -d api.serenut.com   → SSL sertifikası alın
#   4. sudo nginx -t                              → Konfigürasyonu test edin
#   5. sudo systemctl reload nginx               → Nginx'i yeniden yükleyin
#
# Gereksinimler:
#   - certbot: sudo apt install certbot python3-certbot-nginx
#   - Domain A kaydı: api.serenut.com → Sunucu IP

# HTTP → HTTPS yönlendirmesi
server {
    listen 80;
    listen [::]:80;
    server_name api.serenut.com;

    # Let's Encrypt doğrulama için
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # HTTP isteklerini HTTPS'e yönlendir
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Ana Uygulama
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.serenut.com;

    # ── SSL Sertifikaları (certbot tarafından yönetilir) ──────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.serenut.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.serenut.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── SSL Güvenlik Parametreleri ────────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Güvenlik HTTP Başlıkları ──────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com" always;

    # ── Sunucu Bilgilerini Gizle ──────────────────────────────────────────────
    server_tokens off;

    # ── İstek Boyutu Sınırı (çok büyük POST'ları engeller) ───────────────────
    client_max_body_size 50M;

    # ── Zaman Aşımı Ayarları ─────────────────────────────────────────────────
    proxy_connect_timeout       60s;
    proxy_send_timeout          60s;
    proxy_read_timeout          60s;

    # ── Gzip Sıkıştırma ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # ── API Proxy ─────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket desteği (analytics.ws.ts için gerekli)
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Gerçek IP'yi rate limiter'a ilet
        proxy_set_header   X-Original-IP $remote_addr;
    }

    # ── Sağlık Kontrolü Endpoint'i (rate limit'ten muaf) ─────────────────────
    location /health {
        proxy_pass         http://127.0.0.1:3000/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── Statik Dosyalar için Önbellekleme ────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass         http://127.0.0.1:3000;
        expires            7d;
        add_header         Cache-Control "public, immutable";
    }

    # ── Log Dosyaları ────────────────────────────────────────────────────────
    access_log /var/log/nginx/serenut-access.log;
    error_log  /var/log/nginx/serenut-error.log warn;
}
